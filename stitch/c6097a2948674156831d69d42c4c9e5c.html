<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuditTile Mini - Record Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-dim": "#d8dadc",
                        "surface-container-highest": "#e0e3e5",
                        "outline-variant": "#c3c6d7",
                        "inverse-primary": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#bc4800",
                        "outline": "#737686",
                        "primary": "#004ac6",
                        "on-secondary-fixed": "#0d1c2e",
                        "tertiary": "#943700",
                        "surface-container-high": "#e6e8ea",
                        "primary-container": "#2563eb",
                        "tertiary-fixed": "#ffdbcd",
                        "on-background": "#191c1e",
                        "surface-tint": "#0053db",
                        "secondary": "#515f74",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9fb",
                        "surface-container": "#eceef0",
                        "secondary-fixed": "#d5e3fc",
                        "on-primary-fixed": "#00174b",
                        "surface": "#f7f9fb",
                        "tertiary-fixed-dim": "#ffb596",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary-fixed-dim": "#b9c7df",
                        "inverse-surface": "#2d3133",
                        "on-error": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "surface-variant": "#e0e3e5",
                        "on-tertiary-container": "#ffede6",
                        "on-primary-container": "#eeefff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#360f00",
                        "on-primary-fixed-variant": "#003ea8",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f2f4f6",
                        "on-secondary-fixed-variant": "#3a485b",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-container": "#d5e3fc",
                        "on-surface-variant": "#434655",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-surface": "#191c1e",
                        "on-secondary-container": "#57657a"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "container-margin": "24px",
                        "unit": "4px",
                        "cell-padding-v": "8px",
                        "cell-padding-h": "12px",
                        "stack-md": "12px",
                        "stack-sm": "4px",
                        "stack-lg": "24px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "body-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "data-tabular": ["Inter"]
                    },
                    fontSize: {
                        "body-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
                        "headline-md": ["18px", { lineHeight: "24px", letterSpacing: "-0.01em", fontWeight: "600" }],
                        "label-caps": ["11px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "700" }],
                        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
                        "headline-lg": ["24px", { lineHeight: "32px", letterSpacing: "-0.02em", fontWeight: "600" }],
                        "data-tabular": ["14px", { lineHeight: "20px", fontWeight: "500" }]
                    }
                }
            }
        };
    </script>
<style>
        body {
            background-color: #F8FAFC;
            color: #191c1e;
        }
        .form-input-minimal {
            background-color: transparent;
            border: 1px solid #E2E8F0;
            border-radius: 0.125rem;
            padding: 8px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #191c1e;
            width: 100%;
            transition: all 0.2s ease;
        }
        .form-input-minimal:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .form-input-error {
            border-color: #ba1a1a;
        }
        .form-input-error:focus {
            box-shadow: 0 0 0 2px rgba(186, 26, 26, 0.2);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface h-screen flex flex-col overflow-hidden">
<!-- TopNavBar (Transactional Intent - Minimal Shell) -->
<nav class="bg-surface-container-lowest dark:bg-inverse-surface border-b border-outline-variant dark:border-outline flex justify-between items-center px-container-margin py-cell-padding-v w-full z-50 shrink-0">
<div class="flex items-center gap-gutter">
<button aria-label="Go back" class="text-secondary dark:text-secondary-fixed-dim hover:text-primary transition-colors cursor-pointer active:opacity-80 p-1" type="button">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-inverse-primary">
                AuditTile Mini
            </div>
<div class="h-6 w-px bg-outline-variant mx-2"></div>
<h1 class="font-headline-md text-headline-md text-on-surface">Edit Record</h1>
<div class="ml-4 flex items-center gap-2 px-3 py-1 bg-tertiary-fixed rounded-full text-tertiary font-body-sm text-body-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">sync</span>
<span>Unsaved changes</span>
</div>
</div>
<div class="flex items-center gap-4">
<!-- Placeholder for top right actions if needed -->
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto p-container-margin">
<div class="max-w-4xl mx-auto space-y-stack-lg">
<form action="#" class="space-y-stack-lg" method="POST">
<!-- Basic Information Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded p-container-margin">
<h2 class="font-label-caps text-label-caps text-secondary uppercase tracking-wider mb-stack-md border-b border-outline-variant pb-2">Basic Information</h2>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Record Name -->
<div class="col-span-1 md:col-span-2">
<label class="block font-body-sm text-body-sm text-on-surface mb-1" for="record_name">Record Name <span class="text-error">*</span></label>
<input class="form-input-minimal" id="record_name" name="record_name" placeholder="Enter record name" type="text" value="Quarterly Compliance Audit - Q3"/>
</div>
<!-- Category (Error State) -->
<div class="col-span-1">
<label class="block font-body-sm text-body-sm text-on-surface mb-1" for="category">Category <span class="text-error">*</span></label>
<select class="form-input-minimal form-input-error" id="category" name="category">
<option disabled="" selected="" value="">Select a category</option>
<option value="financial">Financial</option>
<option value="operational">Operational</option>
<option value="compliance">Compliance</option>
</select>
<div class="flex items-center gap-1 mt-1 text-error font-body-sm text-body-sm">
<span class="material-symbols-outlined" style="font-size: 14px;">error</span>
<span>Category is required</span>
</div>
</div>
<!-- Status -->
<div class="col-span-1">
<label class="block font-body-sm text-body-sm text-on-surface mb-1" for="status">Status</label>
<select class="form-input-minimal" id="status" name="status">
<option selected="" value="draft">Draft</option>
<option value="in_progress">In Progress</option>
<option value="under_review">Under Review</option>
</select>
</div>
</div>
</section>
<!-- Additional Details Section -->
<section class="bg-surface-container-lowest border border-outline-variant rounded p-container-margin">
<h2 class="font-label-caps text-label-caps text-secondary uppercase tracking-wider mb-stack-md border-b border-outline-variant pb-2">Additional Details</h2>
<div class="space-y-gutter">
<!-- Assigned Auditor -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface mb-1" for="auditor">Assigned Auditor</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 transform -translate-y-1/2 text-secondary" style="font-size: 18px;">person_search</span>
<input class="form-input-minimal pl-10" id="auditor" name="auditor" placeholder="Search auditors..." type="text"/>
</div>
</div>
<!-- Description -->
<div>
<label class="block font-body-sm text-body-sm text-on-surface mb-1" for="description">Description</label>
<textarea class="form-input-minimal resize-none" id="description" name="description" placeholder="Provide detailed context for this record..." rows="4"></textarea>
</div>
</div>
</section>
<!-- Actions Form Footer -->
<div class="flex justify-end items-center gap-unit pt-stack-md border-t border-outline-variant mt-stack-lg">
<button class="px-4 py-2 bg-surface-container-lowest border border-outline-variant text-secondary font-body-sm text-body-sm rounded hover:bg-surface-container-low transition-colors" type="button">
                        Cancel
                    </button>
<button class="px-4 py-2 bg-primary-container text-on-primary border border-transparent font-body-sm text-body-sm rounded hover:opacity-90 transition-opacity flex items-center gap-2" type="submit">
<span class="material-symbols-outlined" style="font-size: 16px;">save</span>
                        Save Record
                    </button>
</div>
</form>
</div>
</main>
</body></html>
